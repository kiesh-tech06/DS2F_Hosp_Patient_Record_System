</head>
<body>

    <!-- header section -->
    <header>
        <a href="home.html" class="logo"><span>H</span>ospital <span>C</span>ares.</a>

        <nav class="navbar">
            <ul>
                <li><a href="home.html">home</a></li>

        <div class="fas fa-bars"></div>

    <!-- appointment form section -->
   <section id="contact" class="contact">
        
        <h1 class="heading">Appointment</h1>
        <h3 class="title"> Please fill in the form to book an appointment. </h3>

        <div class="row">

            <div class="images">
                <img src="appt.png" alt="">
            </div>

            <!-- real form: sends data to submit_appointment.php -->
            <form class="form-container" id="appointmentForm" method="POST" action="submit_appointment.php">

                <!-- message shown after submitting (success or error) -->
                <p id="formMessage"></p>

                <input type="text"   name="full_name" id="full_name" placeholder="Full Name" required>
                <input type="email"  name="email"     id="email"     placeholder="Email" required>
                <input type="number" name="phone"     id="phone"     placeholder="Phone Number" required>
                <textarea name="message" id="message" cols="30" rows="10" placeholder="What's troubling you today?"></textarea>
                <input type="submit" value="send">
            </form>
        </div>

   </section>


    <!-- jquery cdn -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <!-- existing navbar js -->
    <script src="app.js"></script>

    <!-- form js -->
    <script src="form.js"></script>

</body>
